name: shakti_pariwar

description: A production-ready Flutter application for military communication with Firebase backend.

publish_to: 'none'

version: 1.0.0+1



environment:

  sdk: '>=3.0.0 <4.0.0'

  flutter: ">=3.10.0"



dependencies:

  flutter:

    sdk: flutter

  

  # UI

  cupertino_icons: ^1.0.2

  cached_network_image: ^3.3.0

  image_picker: ^1.0.4

  

  # State Management

  provider: ^6.1.1

  

  # Utilities

  intl: ^0.18.1

  uuid: ^4.2.1

  permission_handler: ^11.1.0

  

  # HTTP

  http: ^1.1.2

  

  # Firebase

  firebase_core: ^2.32.0

  firebase_auth: ^4.20.0

  cloud_firestore: ^4.17.5

  firebase_storage: ^11.7.7

  firebase_messaging: ^14.9.4

  

dev_dependencies:

  flutter_test:

    sdk: flutter

  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.13.1



flutter:

  uses-material-design: true

  

  assets:

    - assets/images/

    - assets/icons/



flutter_launcher_icons:

  android: "ic_launcher"

  ios: true

  image_path: "assets/images/58_engr_regt_logo.png"

  min_sdk_android: 21

  adaptive_icon_background: "#1B5E20"

  adaptive_icon_foreground: "assets/images/58_engr_regt_logo.png"

